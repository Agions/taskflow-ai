name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  # 代码质量检查
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Check code formatting
        run: npm run format:check
      
      - name: Run type check
        run: npm run type-check

  # 单元测试
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
        exclude:
          # Reduce matrix size for faster CI
          - os: windows-latest
            node-version: 18.x
          - os: macos-latest
            node-version: 18.x
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # 构建检查
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "❌ Error: dist/index.js not found"
            exit 1
          fi
          echo "✅ Build output verified"
      
      - name: Check CLI works
        run: |
          node dist/index.js --version
          node dist/index.js --help
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 7

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          npm audit --json > audit-report.json || true
          
          # Parse audit results
          critical_count=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          high_count=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          moderate_count=$(cat audit-report.json | jq '.metadata.vulnerabilities.moderate // 0')
          low_count=$(cat audit-report.json | jq '.metadata.vulnerabilities.low // 0')
          
          echo "🔍 Security Scan Results:"
          echo "  Critical: $critical_count"
          echo "  High: $high_count"
          echo "  Moderate: $moderate_count"
          echo "  Low: $low_count"
          
          # Fail on critical vulnerabilities
          if [ "$critical_count" -gt 0 ]; then
            echo "❌ Found $critical_count critical vulnerabilities"
            exit 1
          fi
          
          # Warn on high vulnerabilities
          if [ "$high_count" -gt 10 ]; then
            echo "⚠️ Found $high_count high vulnerabilities (threshold: 10)"
          fi
          
          echo "✅ Security scan passed"
      
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

  # 包大小检查
  size-check:
    name: Package Size Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Check package size
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          
          # Extract size information
          size=$(cat pack-output.txt | grep "package size" | awk '{print $3}')
          unpacked=$(cat pack-output.txt | grep "unpacked size" | awk '{print $3}')
          
          echo "📦 Package size: $size"
          echo "📦 Unpacked size: $unpacked"
          
          # Check dist directory size
          dist_size=$(du -sb dist | awk '{print $1}')
          max_size=$((10 * 1024 * 1024))  # 10MB
          
          if [ "$dist_size" -gt "$max_size" ]; then
            echo "⚠️ Warning: dist directory exceeds 10MB ($(numfmt --to=iec $dist_size))"
          else
            echo "✅ Package size is acceptable ($(numfmt --to=iec $dist_size))"
          fi

  # 集成测试
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
      
      - name: Run integration tests
        run: |
          # Test CLI commands
          echo "Testing CLI commands..."
          node dist/index.js --version
          node dist/index.js --help
          
          # Test init command (dry run)
          echo "Testing init command..."
          node dist/index.js init --help
          
          echo "✅ Integration tests passed"

  # 总结
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, size-check]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size Check | ${{ needs.size-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
