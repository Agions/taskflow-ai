## 注意事项

1. **保持代码行为一致**: Logger 和 console 在功能上等价，只是多了日志级别和结构化输出
2. **性能影响**: Logger 有轻微开销，但远小于收益 (集中日志管理)
3. **错误处理**: 确保 logger.error 的参数传递正确
4. **测试**: 更新测试文件中可能存在的 console 断言

## 质量控制

- ✅ 每个修改的文件都要通过 ESLint
- ✅ 确保构建成功
- ✅ 测试通过率保持 100%
- ✅ 提交信息清晰: `refactor: replace console with logger in <module>`

## 提交策略

建议分批次提交:

1. 第一批: P0 核心模块
2. 第二批: P1 重要模块  
3. 第三批: P2 剩余模块
4. 第四批: 测试文件 (如有需要)

每次提交前:
```bash
npm run check
npm test
```

## 完成标准

- `grep` 命令在非 UI/commands 目录中返回 0 个结果
- 所有测试通过
- 构建成功
- 代码审查通过

