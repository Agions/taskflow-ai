# LogAgent - 日志系统统一任务清单

## 目标

将 TaskFlow AI 项目中的 `console.log/warn/error` 调用统一替换为 `Logger.info/warn/error`。

## 范围

- ✅ **必须处理**: `src/core/`, `src/mcp/`, `src/agent/`, `src/knowledge/`, `src/utils/`, `src/codegen/`, `src/cicd/`
- ❌ **跳过**: `src/cli/ui/` (用户界面，保留彩色输出)
- ❌ **跳过**: `src/cli/commands/` (CLI 命令，保留用户交互)

## 步骤

### 阶段1: 分析和规划 (10分钟)

1. 扫描所有目标目录，统计 console 调用数量
2. 生成文件列表，按优先级排序:
   - P0: `src/core/debug/` (cost-tracker.ts, error-handler.ts, timeline.ts)
   - P0: `src/mcp/` (所有非-UI 文件)
   - P1: `src/agent/` (execution/, planning/, state-machine/)
   - P1: `src/knowledge/` (所有子模块)
   - P2: 其他核心模块

### 阶段2: 批量替换 (1-2小时)

对于每个文件:

1. **导入 Logger**:
```typescript
// 在文件顶部添加
import { getLogger } from '../../utils/logger';

// 在类/函数声明前添加
const logger = getLogger('module:submodule');
```

2. **替换 console 调用**:
```typescript
// 替换前
console.log('Starting process...');
console.warn('Low disk space');
console.error('Failed to connect:', error);

// 替换后
logger.info('Starting process...');
logger.warn('Low disk space');
logger.error('Failed to connect:', error);
```

3. **特殊处理**:
   - `console.log(chalk.*(...))` → 保留 chalk，改用 `logger.info`
   - `console.error(new Error(...))` → `logger.error('msg', error)`
   - 多参数 `console.log(a, b, c)` → `logger.info('a b c', {a, b, c})` 或 `logger.info(\`\${a} \${b} \${c}\`)`

### 阶段3: 验证 (30分钟)

1. 构建项目: `npm run build`
2. 运行测试: `npm test`
3. 检查是否有遗漏:
```bash
grep -rn "console\.\(log\|warn\|error\)" src --include="*.ts" | grep -v "__tests__" | grep -v "/ui/" | grep -v "/commands/"
```
4. 正常应只有 UI 模块有 console

